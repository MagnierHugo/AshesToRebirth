name: PR Validation
 
on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
 
# Cancel any in-progress run on the same PR when a new commit is pushed.
# This avoids queuing up redundant builds when someone pushes several times quickly.
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true
 
jobs:
  build:
    name: Build
    runs-on: [self-hosted, Windows, x64]
 
    environment: ${{ vars.CI_ENVIRONMENT }}
    env:
      UE_INSTALL_PATH: ${{ secrets.UE_INSTALL_PATH }}
      UE_VERSION:      ${{ vars.UE_VERSION }}
      PROJECT_NAME:    ${{ vars.PROJECT_NAME }}
      BUILD_CONFIG:    ${{ github.base_ref == 'main' && 'Shipping' || 'Development' }}
      BUILD_TARGET:    ${{ vars.BUILD_TARGET || 'Win64' }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
 
      - name: Validate environment
        shell: powershell
        run: |
          $ubt = "$env:UE_INSTALL_PATH\Engine\Binaries\DotNET\UnrealBuildTool\UnrealBuildTool.exe"
          if (-not (Test-Path $ubt)) {
            Write-Error "UnrealBuildTool not found at: $ubt"
            Write-Error "Check the UE_INSTALL_PATH secret in the '$env:CI_ENVIRONMENT' GitHub Environment."
            exit 1
          }
          Write-Host "UE $env:UE_VERSION found at $env:UE_INSTALL_PATH"
 
      - name: Restore DDC cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\DerivedDataCache
          key: ddc-${{ vars.UE_VERSION }}-${{ runner.os }}-${{ hashFiles('**/*.uasset','**/*.umap') }}
          restore-keys: ddc-${{ vars.UE_VERSION }}-${{ runner.os }}-
 
      - name: Build
        id: build
        shell: powershell
        run: |
          $ubt      = "$env:UE_INSTALL_PATH\Engine\Binaries\DotNET\UnrealBuildTool\UnrealBuildTool.exe"
          $uproject = "${{ github.workspace }}\$env:PROJECT_NAME.uproject"
          $logDir   = "${{ github.workspace }}\Logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
 
          Write-Host "Building $env:PROJECT_NAME ($env:BUILD_CONFIG / $env:BUILD_TARGET)..."
 
          & $ubt `
            "$($env:PROJECT_NAME)Editor" `
            $env:BUILD_TARGET `
            $env:BUILD_CONFIG `
            "$uproject" `
            -NoHotReloadFromIDE `
            -log `
            -logfile="$logDir\UBT_Build.log"
 
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build FAILED. See the uploaded log artifact for details."
            exit $LASTEXITCODE
          }
          Write-Host "Build succeeded."
 
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-pr${{ github.event.pull_request.number }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}\Logs\UBT_Build.log
          retention-days: 7
